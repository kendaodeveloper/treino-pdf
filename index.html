<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de PDF de Treino</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow-x: hidden;
            box-sizing: border-box;
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            font-size: 1.4em;
            margin-top: 10px;
            text-align: center;
        }
        @media (max-width: 600px) {
            body { padding: 0; }
            .container {
                border-radius: 0;
                box-shadow: none;
                padding: 12px;
            }
            h1 { font-size: 1.2em; margin-top: 5px; }
        }
        .actions {
            margin: 20px 0;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px dashed #bdc3c7;
            border-radius: 5px;
            background: #fafafa;
            cursor: pointer;
            box-sizing: border-box;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-success {
            background-color: #2ecc71;
        }
        .btn-success:hover {
            background-color: #27ae60;
        }
.workout-section h3 {
            margin-top: 0;
        }
        .workout-section {
            margin-top: 30px;
            padding: 15px;
            background: #fdfefe;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        th {
            background-color: #f2f2f2;
            font-size: 0.85em;
        }
        .col-seq { width: 30px; text-align: center; }
        .col-tempo { width: 65px; }
        .col-video { width: 35px; text-align: center; }

        .section-card {
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            background: #ecf0f1;
            border: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 1em;
            font-weight: bold;
            color: #2c3e50;
            -webkit-tap-highlight-color: transparent;
        }
        .section-header:active {
            background: #dfe6e9;
        }
        .section-header .chevron {
            margin-left: auto;
            font-size: 16px;
            line-height: 1;
            transition: transform 0.3s ease;
            transform: rotate(90deg);
            opacity: 0.5;
        }
        .section-card.collapsed .section-header .chevron {
            transform: rotate(0deg);
        }
        .section-body {
            overflow: hidden;
        }
        .section-card.collapsed .section-body {
            max-height: 0 !important;
            overflow: hidden;
            padding: 0 !important;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor de Protocolo de Treino</h1>

    <div id="section-converter" class="section-card">
        <div class="section-header" onclick="toggleSection('section-converter')">
            <span>Converter PDF em Treino</span>
            <span class="chevron">âŻ</span>
        </div>
        <div class="section-body" style="padding: 15px;">
            <div id="browser-warning" style="display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ffc107;">
                <strong>Aviso:</strong> Para funcionar corretamente, abra esta pĂĄgina no <strong>Safari</strong> ou <strong>Chrome</strong>.
                No iPhone: toque no Ă­cone de compartilhar (quadrado com seta) e selecione "Abrir no Safari".
            </div>

            <p style="margin-top:0;">Selecione o PDF do seu treino para visualizar o conteĂșdo completo:</p>

            <div class="actions" style="flex-direction: column; align-items: stretch; gap: 10px;">
                <input type="file" id="pdf-file" accept=".pdf,application/pdf">
                <button id="btn-convert" class="btn" style="padding: 15px; font-size: 18px; -webkit-appearance: none; background-color: #bdc3c7; cursor: not-allowed;" disabled ontouchstart="" onclick="iniciarConversao()">Converter</button>
            </div>

            <div id="status-msg" style="margin: 10px 0; padding: 10px; border-radius: 5px;"></div>
        </div>
    </div>

    <div id="visual-output"></div>
</div>

<script>
    // Detecta WebView (WhatsApp, Instagram, Facebook, etc.)
    var ua = navigator.userAgent || '';
    var isWebView = /FBAN|FBAV|Instagram|Line\/|WhatsApp|wv\)/i.test(ua);
    if (isWebView) {
        document.getElementById('browser-warning').style.display = 'block';
    }

    // Verifica se PDF.js carregou
    var statusMsg = document.getElementById('status-msg');
    if (typeof pdfjsLib === 'undefined') {
        statusMsg.textContent = "Erro: biblioteca PDF.js nĂŁo carregou. Abra no Safari ou no Chrome.";
        statusMsg.style.display = 'block';
        statusMsg.style.background = '#fdecea';
        statusMsg.style.color = '#e74c3c';
    } else {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        statusMsg.style.display = 'none';
    }

    var fileInput = document.getElementById('pdf-file');
    var convertBtn = document.getElementById('btn-convert');
    var visualOutput = document.getElementById('visual-output');

    // Carrega dados do localStorage se existirem
    (function() {
        var saved = localStorage.getItem('treino-pdf-data');
        if (saved) {
            try {
                var jsonData = JSON.parse(saved);
                console.log(JSON.stringify(jsonData, null, 2));
                renderWorkoutVisual(jsonData, true);
                showStatus("Treino carregado com sucesso, selecione um novo PDF de treino para atualizar.", "ok");
            } catch(e) {
                localStorage.removeItem('treino-pdf-data');
            }
        }
    })();

    fileInput.addEventListener('change', function() {
        if (fileInput.files[0]) {
            convertBtn.disabled = false;
            convertBtn.style.backgroundColor = '#2ecc71';
            convertBtn.style.cursor = 'pointer';
        }
    });

    function showStatus(msg, color) {
        statusMsg.textContent = msg;
        statusMsg.style.display = 'block';
        statusMsg.style.background = color === 'error' ? '#fdecea' : '#e8f5e9';
        statusMsg.style.color = color === 'error' ? '#e74c3c' : '#2e7d32';
    }

    function hideStatus() {
        statusMsg.style.display = 'none';
    }

    async function iniciarConversao() {
        try {
            showStatus("Verificando arquivo...", "ok");

            var file = fileInput.files[0];
            if (!file) {
                showStatus("Selecione um arquivo PDF primeiro.", "error");
                return;
            }

            showStatus("Lendo " + file.name + "...", "ok");
            visualOutput.innerHTML = "";

            var arrayBuffer = await new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onload = function(evt) { resolve(evt.target.result); };
                reader.onerror = function() { reject(new Error("Falha ao ler arquivo")); };
                reader.readAsArrayBuffer(file);
            });

            showStatus("Processando PDF (" + file.name + ")...", "ok");
            var pdfData = new Uint8Array(arrayBuffer);
            await processarPDF(pdfData);
            showStatus("Treino carregado com sucesso, selecione um novo PDF de treino para atualizar.", "ok");

        } catch (err) {
            showStatus("Erro: " + (err.message || err), "error");
        }
    }

    async function processarPDF(pdfData) {
        try {
            const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
            let fullText = "";
            // pageData[pageNum] = { textItems: [{str, y}], links: [{url, y}] }
            let pageData = {};

            // Une o texto por pĂĄgina e coleta links + posiĂ§Ă”es Y dos itens de texto
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join("\n");
                fullText += `\n--- SECAO_PAGINA_${i} ---\n` + pageText + "\n";

                // Guarda itens de texto com posiĂ§ĂŁo Y
                let textItems = textContent.items
                    .filter(item => item.str.trim().length > 0)
                    .map(item => ({ str: item.str.trim(), y: item.transform[5] }));

                // Extrai annotations de link (apenas vĂ­deos) com posiĂ§ĂŁo Y central
                let links = [];
                const annotations = await page.getAnnotations();
                for (const ann of annotations) {
                    if (ann.subtype === "Link" && ann.url && isVideoUrl(ann.url)) {
                        let centerY = (ann.rect[1] + ann.rect[3]) / 2;
                        links.push({ url: ann.url, y: centerY });
                    }
                }

                pageData[i] = { textItems, links };
            }

            // Invoca o parser baseado em blocos isolados
            const parsedTrainingData = parseWorkoutTextByBlocks(fullText, pageData);
            
            console.log(JSON.stringify(parsedTrainingData, null, 2));

            // Salva no localStorage para persistir entre recarregamentos
            localStorage.setItem('treino-pdf-data', JSON.stringify(parsedTrainingData));

            renderWorkoutVisual(parsedTrainingData, false);


        } catch (error) {
            console.error(error);
            showStatus("Erro ao processar o PDF: " + error.message, "error");
        }
    }

    function isVideoUrl(url) {
        return /drive\.google\.com|youtube\.com|youtu\.be|vimeo\.com|streamable\.com|loom\.com/i.test(url);
    }

    /**
     * Encontra a posiĂ§ĂŁo Y de um texto na pĂĄgina.
     * Retorna o Y do primeiro item cujo str contĂ©m o inĂ­cio do texto buscado.
     */
    function findTextY(textItems, searchText) {
        if (!searchText || !textItems) { return null; }
        let searchLower = searchText.toLowerCase().substring(0, 15);
        for (const item of textItems) {
            if (item.str.toLowerCase().includes(searchLower)) {
                return item.y;
            }
        }
        // Tenta com palavras individuais (>4 chars)
        let palavras = searchText.split(/\s+/).filter(p => p.length > 4);
        for (const p of palavras) {
            let pLower = p.toLowerCase();
            for (const item of textItems) {
                if (item.str.toLowerCase().includes(pLower)) {
                    return item.y;
                }
            }
        }
        return null;
    }

    /**
     * Busca o link de vĂ­deo mais prĂłximo (por posiĂ§ĂŁo Y) de um exercĂ­cio na pĂĄgina.
     * Cada link sĂł pode ser usado uma vez (removido do array apĂłs uso).
     */
    function findVideoByPosition(exercicioNome, pageNum, pageData) {
        if (!pageData || !pageData[pageNum]) { return null; }
        let pd = pageData[pageNum];
        if (!pd.links || pd.links.length === 0) { return null; }

        let textY = findTextY(pd.textItems, exercicioNome);
        if (textY === null) { return null; }

        // Encontra o link mais prĂłximo por Y (tolerĂąncia mĂĄxima de 30 unidades)
        let bestIdx = -1;
        let bestDist = Infinity;
        for (let i = 0; i < pd.links.length; i++) {
            let dist = Math.abs(pd.links[i].y - textY);
            if (dist < bestDist) {
                bestDist = dist;
                bestIdx = i;
            }
        }
        if (bestIdx !== -1 && bestDist < 50) {
            let url = pd.links[bestIdx].url;
            pd.links.splice(bestIdx, 1); // Remove para nĂŁo reusar
            return url;
        }
        return null;
    }

    /**
     * PARSER GENĂRICO â extrai dados dinamicamente do PDF sem depender de exercĂ­cios hardcoded.
     * Funciona para qualquer aluno/protocolo que siga o mesmo layout.
     */
    function parseWorkoutTextByBlocks(text, pageData) {
        const data = {
            treinador: "",
            aluno: "",
            idade: "",
            objetivo: "",
            frequencia: "",
            duracao_total: "",
            descanso: "",
            alongamentos: [],
            manobras: [],
            treinos: []
        };

        // Normaliza quebras de linha consecutivas e espaĂ§os extras para facilitar regex
        const norm = text.replace(/\r/g, '');

        // 1. Metadados do cabeĂ§alho
        const matchTreinador = norm.match(/TREINADORA?\s*\n[\s\n]*([^\n]+)/i);
        if (matchTreinador) { data.treinador = matchTreinador[1].trim(); }

        const matchAluno = norm.match(/ALUN[OA]\s*\n([\s\S]*?)(?=\nOBJETIVO|\nPERĂODO|\nFREQUĂNCIA|\nDURAĂĂO|\nCARGA|\nDESCANSO|\n---)/i);
        if (matchAluno) {
            let alunoText = matchAluno[1].replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
            let parts = alunoText.split("|");
            data.aluno = parts[0].trim();
            if (parts[1]) { data.idade = parts[1].trim(); }
        }

        // Objetivo â captura mĂșltiplas linhas atĂ© encontrar prĂłximo campo
        const matchObjetivo = norm.match(/OBJETIVO\s*\n([\s\S]*?)(?=\nPERĂODO|\nFREQUĂNCIA|\nDURAĂĂO|\nCARGA|\nDESCANSO|\n---)/i);
        if (matchObjetivo) { data.objetivo = matchObjetivo[1].replace(/\n/g, ' ').replace(/\s+/g, ' ').trim(); }

        const matchFreq = norm.match(/FREQUĂNCIA\s*\n\s*([^\n]+)/i);
        if (matchFreq) { data.frequencia = matchFreq[1].trim(); }

        const matchDuracao = norm.match(/DURAĂĂO TOTAL\s*\n\s*([^\n]+)/i);
        if (matchDuracao) { data.duracao_total = matchDuracao[1].trim(); }

        const matchDescanso = norm.match(/DESCANSO ENTRE\s*\n\s*OS EXERCĂCIOS\s*\n\s*([^\n]+)/i);
        if (matchDescanso) { data.descanso = matchDescanso[1].trim(); }

        // Divide por pĂĄginas uma vez (usado por alongamentos e treinos)
        const paginas = norm.split(/--- SECAO_PAGINA_\d+ ---/);

        // 2. Alongamentos e Manobras â na pĂĄgina 4, os dados aparecem ANTES dos rĂłtulos
        // Estrutura PDF.js: "1\n \n1 x 20"\n \nSĂłleo\n\n2\n \n..." seguido por "ALONGAMENTOS\n \nE MOBILIDADES"
        // EstratĂ©gia: pegar a pĂĄgina que contĂ©m "ALONGAMENTOS" e parsear sequencialmente
        const pageAlong = paginas.find(pg => /ALONGAMENTOS/i.test(pg));
        if (pageAlong) {
            const aLines = pageAlong.split("\n").map(l => l.trim()).filter(l => l.length > 0);
            let i = 0;
            let phase = "along"; // comeĂ§a em alongamentos
            while (i < aLines.length) {
                let line = aLines[i];
                // Detecta fim das seĂ§Ă”es de interesse
                if (/^CONSULTORIA/i.test(line) || /^ALONGAMENTOS/i.test(line)) { break; }
                // Detecta seq: nĂșmero isolado ou "Mobilidade"
                if (/^\d+$/.test(line) || /^Mobilidade$/i.test(line)) {
                    let seq = line;
                    // PrĂłxima linha: tempo/sĂ©ries (contĂ©m "x" e nĂșmero)
                    if (i + 1 < aLines.length && /\d+\s*[xX]\s*\d+/i.test(aLines[i + 1])) {
                        let tempo = aLines[i + 1];
                        // Coleta linhas do exercĂ­cio atĂ© prĂłxima seq ou seĂ§ĂŁo
                        let exLines = [];
                        let j = i + 2;
                        while (j < aLines.length) {
                            let next = aLines[j];
                            if (/^\d+$/.test(next) || /^Mobilidade$/i.test(next) || /^CONSULTORIA|^ALONGAMENTOS|^MANOBRAS/i.test(next)) { break; }
                            exLines.push(next);
                            j++;
                        }
                        // Separa sub-exercĂ­cios por palavras-chave
                        let subExercicios = [{ lines: [], tipo: "" }];
                        let cur = subExercicios[0];
                        for (let el = 0; el < exLines.length; el++) {
                            let eline = exLines[el];
                            let matchPfx = eline.match(/^(SupersĂ©rie|PĂłs exaustĂŁo)\s*(.*)/i);
                            if (matchPfx) {
                                cur = { lines: [], tipo: matchPfx[1] };
                                if (matchPfx[2].trim()) { cur.lines.push(matchPfx[2].trim()); }
                                subExercicios.push(cur);
                                continue;
                            }
                            if (/^\(apĂłs\s/i.test(eline)) {
                                cur = { lines: [eline], tipo: "" };
                                subExercicios.push(cur);
                                continue;
                            }
                            cur.lines.push(eline);
                        }

                        subExercicios.forEach((sub, si) => {
                            let nome = sub.lines.join(" ").trim();
                            if (!nome) return;
                            let exercicio = sub.tipo ? sub.tipo + " " + nome : nome;
                            if (phase === "along") {
                                data.alongamentos.push({ seq: si === 0 ? seq : "", tempo: si === 0 ? tempo : "", exercicio, isSubExercise: si > 0 });
                                if (/^Mobilidade$/i.test(seq)) { phase = "manobras"; }
                            } else {
                                data.manobras.push({ seq: si === 0 ? seq : "", series: si === 0 ? tempo : "", exercicio, isSubExercise: si > 0 });
                            }
                        });
                        i = j;
                    } else {
                        i++;
                    }
                } else {
                    i++;
                }
            }
        }

        // 3. Treinos â extraĂ§ĂŁo genĂ©rica por pĂĄgina

        paginas.forEach((p, pageIdx) => {
            // Identifica pĂĄginas de treino pela presenĂ§a de "EXERCĂCIOS" (tabela de exercĂ­cios)
            if (!p.toUpperCase().includes("EXERCĂCIOS")) { return; }

            // Identifica qual treino â lida com quebras de linha do PDF.js
            // Ex: "TREINO 1\n \nE 5" ou "TREINO\n \n3"
            let idMatch = p.match(/TREINO\s*\n?\s*(\d+)\s*\n?\s*(?:[Ee]\s*\n?\s*(\d+))?/i);
            if (!idMatch) { return; }
            let identificador = idMatch[2]
                ? `TREINO ${idMatch[1]} E ${idMatch[2]}`
                : `TREINO ${idMatch[1]}`;

            let linhas = p.split("\n").map(l => l.trim()).filter(l => l.length > 0);

            // Dias/foco â texto prĂłximo ao identificador do treino (ex: "Segunda e Sexta-Feira (...)")
            let diasFoco = "";
            const diasRegex = p.match(/(?:Segunda|TerĂ§a|Quarta|Quinta|Sexta|SĂĄbado|Domingo)[^\n]*/i);
            if (diasRegex) { diasFoco = diasRegex[0].trim(); }

            // Warm Up â extrai como array de exercĂ­cios com vĂ­deo
            let aquecimento = [];
            let idxWarm = linhas.findIndex(l => l.toUpperCase().includes("WARM UP"));
            if (idxWarm !== -1) {
                let warmLines = [];
                for (let i = idxWarm + 1; i < linhas.length && i < idxWarm + 10; i++) {
                    let l = linhas[i];
                    if (/^(SQ|EXERCĂCIOS|AERĂBIO|RELAXAMENTO|TREINO)/i.test(l)) { break; }
                    if (l === "REPETIĂĂES" || /^\d+Â°$/.test(l)) { continue; }
                    // Captura info de reps/cadĂȘncia (ex: "2 x 15 REPS | CadĂȘncia 3:3")
                    if (/^\d+\s*x\s*\d+\s*REPS/i.test(l)) {
                        // Junta com prĂłxima linha se for continuaĂ§ĂŁo de cadĂȘncia
                        let repsInfo = l;
                        if (i + 1 < linhas.length && /^CadĂȘncia/i.test(linhas[i + 1])) {
                            repsInfo += " | " + linhas[i + 1];
                            i++;
                        }
                        // Associa reps ao Ășltimo exercĂ­cio adicionado
                        if (warmLines.length > 0) {
                            warmLines[warmLines.length - 1].reps = repsInfo;
                        }
                        continue;
                    }
                    warmLines.push({ nome: l });
                }
                // Associa vĂ­deos aos exercĂ­cios de aquecimento
                aquecimento = warmLines.map(item => {
                    let video = findVideoByPosition(item.nome, pageIdx, pageData);
                    return video ? { ...item, video } : item;
                });
            }

            // AerĂłbio â extrai como array de exercĂ­cios com vĂ­deo
            let aerobio = [];
            let idxAero = linhas.findIndex(l => l.toUpperCase() === "AERĂBIO");
            if (idxAero !== -1) {
                let aeroLines = [];
                for (let i = idxAero + 1; i < linhas.length && i < idxAero + 8; i++) {
                    let l = linhas[i];
                    if (/^(SQ|EXERCĂCIOS|RELAXAMENTO|TREINO|WARM)/i.test(l)) { break; }
                    if (l === "DURAĂĂO" || /^\d+Â°$/.test(l)) { continue; }
                    // DuraĂ§ĂŁo (ex: "15 a 20'", "15'")
                    if (/^\d+.*'$/.test(l)) {
                        if (aeroLines.length > 0) {
                            aeroLines[aeroLines.length - 1].duracao = l;
                        }
                        continue;
                    }
                    aeroLines.push({ nome: l });
                }
                aerobio = aeroLines.map(item => {
                    let video = findVideoByPosition(item.nome, pageIdx, pageData);
                    return video ? { ...item, video } : item;
                });
            }

            // Relaxamento â busca o bloco "SQ RELAXAMENTO REPETIĂĂES" (nĂŁo o rĂłtulo "RELAXAMENTO AERĂBIO")
            let relaxamento = [];
            for (let ri = 0; ri < linhas.length - 1; ri++) {
                // PadrĂŁo: "SQ" seguido por "RELAXAMENTO" seguido por "REPETIĂĂES"
                if (linhas[ri] === "SQ" && linhas[ri + 1] === "RELAXAMENTO" && ri + 2 < linhas.length && linhas[ri + 2] === "REPETIĂĂES") {
                    let relaxLines = [];
                    for (let j = ri + 3; j < linhas.length && j < ri + 8; j++) {
                        let l = linhas[j];
                        if (/^(SQ|EXERCĂCIOS|AERĂBIO|TREINO|WARM|RELAXAMENTO)/i.test(l)) { break; }
                        if (/(?:Segunda|TerĂ§a|Quarta|Quinta|Sexta|SĂĄbado|Domingo)/i.test(l)) { break; }
                        if (/^\d+Â°$/.test(l)) { continue; }
                        // Reps info (ex: "1 x 40"")
                        if (/^\d+\s*x\s*\d+/i.test(l)) {
                            if (relaxLines.length > 0) {
                                relaxLines[relaxLines.length - 1].reps = l;
                            }
                            continue;
                        }
                        relaxLines.push({ nome: l });
                    }
                    relaxamento = relaxLines.map(item => {
                        let video = findVideoByPosition(item.nome, pageIdx, pageData);
                        return video ? { ...item, video } : item;
                    });
                    break;
                }
            }

            // ExercĂ­cios â extrai do bloco entre "EXERCĂCIOS" e prĂłxima seĂ§ĂŁo
            // Cada sequĂȘncia (1Â°, 2Â°...) pode conter sub-exercĂ­cios separados por "SupersĂ©rie" ou "PĂłs exaustĂŁo"
            let exercicios = [];
            let idxExerc = linhas.findIndex(l => l.toUpperCase() === "EXERCĂCIOS");
            if (idxExerc !== -1) {
                let startIdx = idxExerc + 1;
                while (startIdx < linhas.length && /^\d+\s*$/.test(linhas[startIdx])) { startIdx++; }
                while (startIdx < linhas.length && /^REPS$/i.test(linhas[startIdx])) { startIdx++; }
                while (startIdx < linhas.length && (/^\d+\s*$/.test(linhas[startIdx]) || /^REPS$/i.test(linhas[startIdx]))) { startIdx++; }

                // Coleta linhas brutas por sequĂȘncia
                let currentLines = null;
                let seqGroups = [];
                for (let i = startIdx; i < linhas.length; i++) {
                    let l = linhas[i];
                    if (/^(SQ|WARM UP|AERĂBIO|RELAXAMENTO|TREINO)/i.test(l)) { break; }
                    if (/^\d+Â°$/.test(l)) {
                        if (currentLines) { seqGroups.push(currentLines); }
                        currentLines = [];
                        continue;
                    }
                    if (/^\d{2}\s*$/.test(l) || /^REPS$/i.test(l)) { continue; }
                    if (currentLines !== null) { currentLines.push(l); }
                }
                if (currentLines) { seqGroups.push(currentLines); }

                // Separa sub-exercĂ­cios dentro de cada grupo linha por linha
                seqGroups.forEach((group, gIdx) => {
                    let seq = (gIdx + 1) + "Â°";
                    let exercises = []; // array de { lines: [], tipo: "" }
                    let current = { lines: [], tipo: "" };
                    exercises.push(current);

                    for (let li = 0; li < group.length; li++) {
                        let line = group[li];
                        // "SupersĂ©rie ..." ou "PĂłs exaustĂŁo ..." inicia novo sub-exercĂ­cio
                        let matchPrefix = line.match(/^(SupersĂ©rie|PĂłs exaustĂŁo)\s*(.*)/i);
                        if (matchPrefix) {
                            current = { lines: [], tipo: matchPrefix[1] };
                            if (matchPrefix[2].trim()) { current.lines.push(matchPrefix[2].trim()); }
                            exercises.push(current);
                            continue;
                        }
                        // "(apĂłs X semanas ...)" inicia novo sub-exercĂ­cio (alternativa)
                        if (/^\(apĂłs\s/i.test(line)) {
                            current = { lines: [line], tipo: "" };
                            exercises.push(current);
                            continue;
                        }
                        // ContinuaĂ§ĂŁo de linha (ex: "invertido)" apĂłs "(apĂłs ... Hack angular")
                        current.lines.push(line);
                    }

                    exercises.forEach((ex, exIdx) => {
                        let nome = ex.lines.join(" ").trim();
                        if (!nome) return;
                        let fullNome = ex.tipo ? ex.tipo + " " + nome : nome;
                        exercicios.push({ seq, nome: fullNome, isSubExercise: exIdx > 0 });
                    });
                });
            }

            if (exercicios.length > 0) {
                // Associa links de vĂ­deo a cada exercĂ­cio/sub-exercĂ­cio individualmente
                let exerciciosComVideo = exercicios.map(ex => {
                    // Para buscar vĂ­deo, limpa prefixos e parĂȘnteses
                    let searchName = ex.nome
                        .replace(/^(SupersĂ©rie|PĂłs exaustĂŁo)\s*/i, '')
                        .replace(/^\(apĂłs\s.*?(realizar|fazer)\s*/i, '')
                        .replace(/\)$/, '')
                        .trim();
                    let video = findVideoByPosition(searchName, pageIdx, pageData);
                    return video ? { ...ex, video } : ex;
                });

                let treino = {
                    identificador: identificador,
                    dias_e_foco: diasFoco,
                    aquecimento: aquecimento,
                    exercicios: exerciciosComVideo,
                    aerobio: aerobio
                };
                if (relaxamento.length > 0) { treino.relaxamento = relaxamento; }
                data.treinos.push(treino);
            }
        });

        // Associa links de vĂ­deo aos alongamentos e manobras (procura na pĂĄgina que contĂ©m ALONGAMENTOS)
        let alongPageNum = paginas.findIndex(pg => /ALONGAMENTOS/i.test(pg));
        if (alongPageNum > 0) {
            data.alongamentos = data.alongamentos.map(item => {
                let searchName = item.exercicio
                    .replace(/^(SupersĂ©rie|PĂłs exaustĂŁo)\s*/i, '')
                    .replace(/^\(apĂłs\s.*?(realizar|fazer)\s*/i, '')
                    .replace(/\)$/, '').trim();
                let video = findVideoByPosition(searchName, alongPageNum, pageData);
                return video ? { ...item, video } : item;
            });
            data.manobras = data.manobras.map(item => {
                let searchName = item.exercicio
                    .replace(/^(SupersĂ©rie|PĂłs exaustĂŁo)\s*/i, '')
                    .replace(/^\(apĂłs\s.*?(realizar|fazer)\s*/i, '')
                    .replace(/\)$/, '').trim();
                let video = findVideoByPosition(searchName, alongPageNum, pageData);
                return video ? { ...item, video } : item;
            });
        }

        return data;
    }

    function toggleSection(id) {
        var card = document.getElementById(id);
        if (card) { card.classList.toggle('collapsed'); }
    }

    function getDayOfWeek() {
        var days = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'];
        return days[new Date().getDay()];
    }

    function treinoMatchesToday(diasFoco) {
        if (!diasFoco) return false;
        var today = getDayOfWeek();
        var normalized = diasFoco.toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return normalized.includes(today);
    }

    function applySectionVisibility(isFromStorage) {
        if (isFromStorage) {
            // Veio do localStorage: esconde converter, mostra tudo, treinos sĂł o do dia
            document.getElementById('section-converter').classList.add('collapsed');

            var treinoCards = document.querySelectorAll('.section-card[data-dias-foco]');
            treinoCards.forEach(function(card) {
                var dias = card.getAttribute('data-dias-foco');
                if (!treinoMatchesToday(dias)) {
                    card.classList.add('collapsed');
                }
            });
        } else {
            // Acabou de converter: esconde converter, mostra tudo (sem filtro por dia)
            document.getElementById('section-converter').classList.add('collapsed');
        }
    }

    /**
     * RENDERIZADOR VISUAL
     */
    function renderWorkoutVisual(jsonData, isFromStorage) {
        let html = '';

        // SeĂ§ĂŁo 2: Info do aluno (card azul)
        html += `
        <div id="section-info" class="section-card">
            <div class="section-header" onclick="toggleSection('section-info')" style="background: #bbdefb;">

                <span class="chevron">âŻ</span>

            <div class="section-body" style="background: #e1f5fe; padding: 15px;">

            </div>
        </div>
        `;

        if(jsonData.alongamentos.length > 0) {
            html += `
                <div id="section-alongamentos" class="section-card">
                    <div class="section-header" onclick="toggleSection('section-alongamentos')" style="background: #3498db; color: #fff;">
                        <span>Alongamentos e Mobilidade</span>
                        <span class="chevron">âŻ</span>
                    </div>
                    <div class="section-body workout-section" style="margin-top:0; border-radius:0;">
                    <table>
                        <thead><tr><th class="col-seq">Seq</th><th class="col-tempo">Tempo / Reps</th><th>ExercĂ­cio</th><th class="col-video">Link</th></tr></thead>
                        <tbody>
            `;
            let ai = 0;
            while (ai < jsonData.alongamentos.length) {
                let item = jsonData.alongamentos[ai];
                let videoBtn = item.video ? `<a href="${item.video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                let subCount = 0;
                while (ai + 1 + subCount < jsonData.alongamentos.length && jsonData.alongamentos[ai + 1 + subCount].isSubExercise) { subCount++; }
                let rowspan = subCount > 0 ? ` rowspan="${1 + subCount}" style="vertical-align:middle;"` : "";
                html += `<tr><td${rowspan}>${item.seq}</td><td${rowspan}>${item.tempo}</td><td>${item.exercicio}</td><td style="text-align:center;">${videoBtn}</td></tr>`;
                for (let si = 0; si < subCount; si++) {
                    let sub = jsonData.alongamentos[ai + 1 + si];
                    let subBtn = sub.video ? `<a href="${sub.video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                    html += `<tr><td>${sub.exercicio}</td><td style="text-align:center;">${subBtn}</td></tr>`;
                }
                ai += 1 + subCount;
            }
            html += `</tbody></table></div></div>`;
        }

        if(jsonData.manobras.length > 0) {
            html += `
                <div id="section-manobras" class="section-card">
                    <div class="section-header" onclick="toggleSection('section-manobras')" style="background: #3498db; color: #fff;">
                        <span>Manobras RespiratĂłrias e Abdominais</span>
                        <span class="chevron">âŻ</span>
                    </div>
                    <div class="section-body workout-section" style="margin-top:0; border-radius:0;">
                    <table>
                        <thead><tr><th class="col-seq">Seq</th><th class="col-tempo">SĂ©ries x Tempo</th><th>ExercĂ­cio</th><th class="col-video">Link</th></tr></thead>
                        <tbody>
            `;
            let mi = 0;
            while (mi < jsonData.manobras.length) {
                let item = jsonData.manobras[mi];
                let videoBtn = item.video ? `<a href="${item.video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                let subCount = 0;
                while (mi + 1 + subCount < jsonData.manobras.length && jsonData.manobras[mi + 1 + subCount].isSubExercise) { subCount++; }
                let rowspan = subCount > 0 ? ` rowspan="${1 + subCount}" style="vertical-align:middle;"` : "";
                html += `<tr><td${rowspan}>${item.seq}</td><td${rowspan}>${item.series}</td><td>${item.exercicio}</td><td style="text-align:center;">${videoBtn}</td></tr>`;
                for (let si = 0; si < subCount; si++) {
                    let sub = jsonData.manobras[mi + 1 + si];
                    let subBtn = sub.video ? `<a href="${sub.video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                    html += `<tr><td>${sub.exercicio}</td><td style="text-align:center;">${subBtn}</td></tr>`;
                }
                mi += 1 + subCount;
            }
            html += `</tbody></table></div></div>`;
        }

        // Helper para gerar linha de tabela
        function treinoRow(seq, nome, info, video) {
            let videoBtn = video ? `<a href="${video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
            let infoSuffix = info ? `<br><small style="color:#7f8c8d;">(${info})</small>` : "";
            return `<tr><td>${seq}</td><td>${nome}${infoSuffix}</td><td style="text-align:center;">${videoBtn}</td></tr>`;
        }

        jsonData.treinos.forEach((treino, treinoIdx) => {
            let sectionId = 'section-treino-' + treinoIdx;
            html += `
                <div id="${sectionId}" class="section-card" data-dias-foco="${(treino.dias_e_foco || '').replace(/"/g, '&quot;')}">
                    <div class="section-header" onclick="toggleSection('${sectionId}')" style="background: #c8e6c9;">
                        <span>${(treino.dias_e_foco || treino.identificador).replace(/\s*\(/, '<br>(')}</span>
                        <span class="chevron">âŻ</span>
                    </div>
                    <div class="section-body workout-section" style="margin-top:0; border-radius:0; border-left-color: #2ecc71;">
                    <table>
                        <thead><tr><th class="col-seq">Seq</th><th>ExercĂ­cio</th><th class="col-video">Link</th></tr></thead>
                        <tbody>
            `;

            // Aquecimento
            if (Array.isArray(treino.aquecimento) && treino.aquecimento.length > 0) {
                html += `<tr><td colspan="3" style="background:#e8f8f5; font-weight:bold;">Aquecimento (Warm Up)</td></tr>`;
                treino.aquecimento.forEach((w, idx) => {
                    let nome = typeof w === "object" ? w.nome : w;
                    let reps = (typeof w === "object" && w.reps) ? w.reps : "";
                    let video = (typeof w === "object") ? w.video : null;
                    html += treinoRow(idx + 1, nome, reps, video);
                });
            }

            // ExercĂ­cios â agrupa principal + sub-exercĂ­cios com rowspan
            html += `<tr><td colspan="3" style="background:#eaf2f8; font-weight:bold;">ExercĂ­cios</td></tr>`;
            let ei = 0;
            while (ei < treino.exercicios.length) {
                let ex = treino.exercicios[ei];
                let nome = typeof ex === "object" ? ex.nome : ex;
                let video = (typeof ex === "object") ? ex.video : null;
                let seq = (typeof ex === "object" && ex.seq) ? ex.seq : "";
                let videoBtn = video ? `<a href="${video}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                // Conta sub-exercĂ­cios seguintes
                let subCount = 0;
                while (ei + 1 + subCount < treino.exercicios.length && treino.exercicios[ei + 1 + subCount].isSubExercise) { subCount++; }
                let rowspan = subCount > 0 ? ` rowspan="${1 + subCount}" style="vertical-align:middle;"` : "";
                html += `<tr><td${rowspan}>${seq}</td><td>${nome}</td><td style="text-align:center;">${videoBtn}</td></tr>`;
                // Sub-exercĂ­cios (sem cĂ©lula de ordem)
                for (let si = 0; si < subCount; si++) {
                    let sub = treino.exercicios[ei + 1 + si];
                    let subNome = typeof sub === "object" ? sub.nome : sub;
                    let subVideo = (typeof sub === "object") ? sub.video : null;
                    let subBtn = subVideo ? `<a href="${subVideo}" target="_blank" style="color: #e74c3c; text-decoration: none; font-size: 18px;" title="Ver vĂ­deo">&#9654;</a>` : "";
                    html += `<tr><td>${subNome}</td><td style="text-align:center;">${subBtn}</td></tr>`;
                }
                ei += 1 + subCount;
            }

            // AerĂłbio
            if (Array.isArray(treino.aerobio) && treino.aerobio.length > 0) {
                html += `<tr><td colspan="3" style="background:#fef9e7; font-weight:bold;">Cardio / AerĂłbio</td></tr>`;
                treino.aerobio.forEach((a, idx) => {
                    let nome = typeof a === "object" ? a.nome : a;
                    let duracao = (typeof a === "object" && a.duracao) ? a.duracao : "";
                    let video = (typeof a === "object") ? a.video : null;
                    html += treinoRow(idx + 1, nome, duracao, video);
                });
            } else if (typeof treino.aerobio === "string" && treino.aerobio) {
                html += `<tr><td colspan="3" style="background:#fef9e7; font-weight:bold;">Cardio / AerĂłbio</td></tr>`;
                html += `<tr><td>1</td><td>${treino.aerobio}</td><td></td></tr>`;
            }

            // Relaxamento
            if (treino.relaxamento) {
                html += `<tr><td colspan="3" style="background:#f5eef8; font-weight:bold;">Relaxamento</td></tr>`;
                if (Array.isArray(treino.relaxamento)) {
                    treino.relaxamento.forEach((r, idx) => {
                        let nome = typeof r === "object" ? r.nome : r;
                        let reps = (typeof r === "object" && r.reps) ? r.reps : "";
                        let video = (typeof r === "object") ? r.video : null;
                        html += treinoRow(idx + 1, nome, reps, video);
                    });
                } else {
                    html += `<tr><td>1</td><td>${treino.relaxamento}</td><td></td></tr>`;
                }
            }

            html += `</tbody></table></div></div>`;

        });

        visualOutput.innerHTML = html;
        applySectionVisibility(isFromStorage);
    }
